name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Start the acquiring bank simulator
        run: docker compose up -d

      - name: Wait for the bank simulator
        run: timeout 60 bash -c 'until curl -s -o /dev/null http://localhost:8080/payments; do sleep 1; done'

      - name: End-to-end tests
        run: go test -tags=e2e -count=1 ./...

      - name: Stop the acquiring bank simulator
        if: always()
        run: docker compose down
