name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` can stamp the build version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test
        run: make test

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Start the acquiring bank simulator
        run: docker compose up -d

      - name: Wait for the bank simulator
        run: timeout 60 bash -c 'until curl -s -o /dev/null http://localhost:8080/payments; do sleep 1; done'

      - name: End-to-end tests
        run: make e2e

      - name: Stop the acquiring bank simulator
        if: always()
        run: docker compose down
